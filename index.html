<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <title>CHEZIYA HIGH SCHOOL | Employee Management System</title>

            background-position: center center;
            background-repeat: no-repeat;
            filter: brightness(0.85) contrast(1.05);
            z-index: -2;
        }

        /* glassmorphism overlay for readability */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 25, 35, 0.4);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* ========== LOGIN SCREEN ========== */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .login-header h1 {
            font-size: 1.7rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .login-header p {
            color: rgba(255,255,255,0.9);
        }

        .login-form .form-group {
            margin-bottom: 1rem;
        }

        .login-form label {
            font-weight: 600;
            color: white;
            display: block;
            margin-bottom: 0.3rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .login-form input, .login-form select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.85);
            font-size: 1rem;
            transition: 0.2s;
        }

        .login-form input:focus, .login-form select:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 2px #0ea5e9;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-primary {
            background: #0ea5e9;
            color: white;
            width: 100%;
            font-size: 1rem;
        }

        .btn-primary:hover {
            background: #0284c7;
            transform: scale(0.98);
        }

        .login-demo {
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            padding: 0.8rem;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
            text-align: center;
        }

        /* ========== APP LAYOUT ========== */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(12, 74, 110, 0.75);
            backdrop-filter: blur(18px);
            color: white;
            position: fixed;
            height: 100vh;
            z-index: 40;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar-brand {
            padding: 1.8rem 1.5rem;
            font-weight: 800;
            font-size: 1.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.5rem 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
            color: rgba(255,255,255,0.9);
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(4px);
            color: white;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
        }

        .top-navbar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(14px);
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 30;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
        }

        .navbar-title {
            font-weight: 700;
            font-size: 1.3rem;
            flex: 1;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 0.3rem 1rem;
            border-radius: 60px;
        }

        .content-area {
            padding: 2rem;
        }

        /* TRANSPARENT BLUR CARDS */
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.35);
            transition: all 0.25s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            color: #0f172a;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.8rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        th {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            font-weight: 700;
        }

        .badge-status {
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            color: white;
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 30px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid white;
            color: white;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-container {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            width: 90%;
            max-width: 550px;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            transform: translateX(120%);
            transition: 0.3s;
            z-index: 2000;
        }

        .toast.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">🚍🏫</div>
                <h1>CHEZIYA HIGH SCHOOL</h1>
                <p>Employee Management System</p>
            </div>
            <form id="loginForm">
                <div class="form-group"><label>Username</label><input type="text" id="loginUsername" placeholder="Enter username" required></div>
                <div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="loginPassword" placeholder="Password" required><button type="button" class="toggle-password" id="toggleLoginPassword">👁️</button></div></div>
                <div class="form-group"><label>Role</label><select id="loginRole" required><option value="">Select Role</option><option value="admin">Admin</option><option value="principal">Principal</option><option value="teacher">Teacher</option></select></div>
                <button type="submit" class="btn btn-primary">🔐 Login to System</button>
                <div id="loginError" style="color:#ffb3b3; margin-top:0.8rem;"></div>
            </form>
            <div class="login-demo">Demo: admin/admin123 | principal/principal123 | teacher/teacher123</div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appContainer" class="app-container" style="display:none;">
        <div id="sidebarOverlay" class="sidebar-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:35;"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">🏫 CHEZIYA HIGH</div>
            <nav class="sidebar-nav">
                <div data-page="dashboard" class="nav-item active">📊 Dashboard</div>
                <div data-page="employees" class="nav-item">👥 Employees</div>
                <div data-page="departments" class="nav-item">🏛️ Departments</div>
                <div data-page="leave" class="nav-item">📝 Leave</div>
                <div data-page="attendance" class="nav-item">⏰ Attendance</div>
                <div data-page="announcements" class="nav-item">📢 Announcements</div>
                <div data-page="profile" class="nav-item">👤 My Profile</div>
            </nav>
            <div style="padding:1rem;"><button id="logoutBtn" class="btn btn-outline" style="width:100%;">🚪 Logout</button></div>
        </aside>
        <main class="main-content">
            <header class="top-navbar">
                <button id="menuToggle" class="menu-toggle">☰</button>
                <div class="navbar-title" id="navbarTitle">Dashboard</div>
                <div class="user-info"><span id="userNameDisplay">User</span><span id="userRoleBadge" style="background:rgba(255,255,255,0.3); padding:0.2rem 0.8rem; border-radius:30px;"></span></div>
            </header>
            <div class="content-area" id="contentArea"></div>
        </main>
    </div>

    <div id="modalOverlay" class="modal-overlay" style="display:none;"><div class="modal-container"><div style="padding:1rem; border-bottom:1px solid rgba(255,255,255,0.3); display:flex; justify-content:space-between;"><h3 id="modalTitle">Modal</h3><button id="modalClose" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button></div><div id="modalBody" style="padding:1.5rem;"></div></div></div>
    <div id="toast" class="toast"></div>

    <script>
        // SEED DATA
        function seedData() {
            if (!localStorage.getItem('cheziya_users')) localStorage.setItem('cheziya_users', JSON.stringify([
                { id: 'u1', username: 'admin', password: 'admin123', role: 'admin', name: 'Admin User', email: 'admin@cheziya.ac.zw' },
                { id: 'u2', username: 'principal', password: 'principal123', role: 'principal', name: 'Dr. Moyo', email: 'principal@cheziya.ac.zw' },
                { id: 'u3', username: 'teacher', password: 'teacher123', role: 'teacher', name: 'Mrs. Ndlovu', email: 'teacher@cheziya.ac.zw' }
            ]));
            if (!localStorage.getItem('cheziya_employees')) localStorage.setItem('cheziya_employees', JSON.stringify([
                { id: 'emp1', name: 'Mrs. Ndlovu', empId: 'T001', position: 'Mathematics', department: 'Sciences', status: 'Active', educationLevel: "Bachelor's", phone: '+263771234567' }
            ]));
            if (!localStorage.getItem('cheziya_departments')) localStorage.setItem('cheziya_departments', JSON.stringify([]));
            if (!localStorage.getItem('cheziya_leave')) localStorage.setItem('cheziya_leave', JSON.stringify([]));
            if (!localStorage.getItem('cheziya_attendance')) localStorage.setItem('cheziya_attendance', JSON.stringify([]));
            if (!localStorage.getItem('cheziya_announcements')) localStorage.setItem('cheziya_announcements', JSON.stringify([]));
        }
        seedData();
        let currentUser = null;

        function showToast(msg) { let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
        function openModal(title, html) { document.getElementById('modalTitle').innerText=title; document.getElementById('modalBody').innerHTML=html; document.getElementById('modalOverlay').style.display='flex'; }
        function closeModal() { document.getElementById('modalOverlay').style.display='none'; }
        document.getElementById('modalClose').onclick=closeModal;

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const role = document.getElementById('loginRole').value;
            const users = JSON.parse(localStorage.getItem('cheziya_users'));
            const user = users.find(u => u.username === username && u.password === password && u.role === role);
            if(user){
                currentUser = user;
                sessionStorage.setItem('currentUser', JSON.stringify(user));
                document.getElementById('loginScreen').style.display='none';
                document.getElementById('appContainer').style.display='flex';
                initApp();
                showToast(`Welcome ${user.name}`);
            } else { document.getElementById('loginError').innerText='Invalid credentials or role'; }
        });
        document.getElementById('toggleLoginPassword').onclick=function(){ let p=document.getElementById('loginPassword'); p.type=p.type==='password'?'text':'password'; this.innerText=p.type==='password'?'👁️':'🙈'; };
        document.getElementById('logoutBtn').onclick=()=>{ sessionStorage.clear(); currentUser=null; document.getElementById('appContainer').style.display='none'; document.getElementById('loginScreen').style.display='flex'; showToast('Logged out'); };

        function initApp(){
            document.getElementById('userNameDisplay').innerText=currentUser.name;
            document.getElementById('userRoleBadge').innerText=currentUser.role.toUpperCase();
            document.querySelectorAll('.nav-item').forEach(nav=>{
                nav.addEventListener('click', ()=>{
                    let page = nav.dataset.page;
                    if(currentUser.role === 'teacher' && (page === 'employees' || page === 'departments')) { showToast('Access denied'); return; }
                    document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
                    nav.classList.add('active');
                    document.getElementById('navbarTitle').innerText=nav.innerText.trim();
                    renderPage(page);
                });
            });
            document.getElementById('menuToggle').onclick=()=>{ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('active'); };
            document.getElementById('sidebarOverlay').onclick=()=>{ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); };
            renderPage('dashboard');
        }

        function renderPage(page){
            if(page === 'dashboard') document.getElementById('contentArea').innerHTML = renderDashboard();
            else if(page === 'employees') document.getElementById('contentArea').innerHTML = renderEmployees();
            else if(page === 'departments') document.getElementById('contentArea').innerHTML = renderDepartments();
            else if(page === 'leave') document.getElementById('contentArea').innerHTML = renderLeave();
            else if(page === 'attendance') document.getElementById('contentArea').innerHTML = renderAttendance();
            else if(page === 'announcements') document.getElementById('contentArea').innerHTML = renderAnnouncements();
            else if(page === 'profile') document.getElementById('contentArea').innerHTML = `<div class="card"><h3>👤 My Profile</h3><p><strong>Name:</strong> ${currentUser.name}</p><p><strong>Role:</strong> ${currentUser.role}</p><p><strong>Email:</strong> ${currentUser.email}</p></div>`;
        }

        function renderDashboard(){
            const employees = JSON.parse(localStorage.getItem('cheziya_employees'));
            const depts = JSON.parse(localStorage.getItem('cheziya_departments'));
            const leaves = JSON.parse(localStorage.getItem('cheziya_leave'));
            return `<div class="card"><h2>Welcome back, ${currentUser.name} 🏫</h2><p>School management dashboard | Today: ${new Date().toLocaleDateString()}</p></div>
            <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1.2rem;">
                <div class="card" style="text-align:center;"><div style="font-size:2.8rem;">👥</div><h3>${employees.length}</h3><p>Total Staff</p></div>
                <div class="card" style="text-align:center;"><div style="font-size:2.8rem;">🏛️</div><h3>${depts.length}</h3><p>Departments</p></div>
                <div class="card" style="text-align:center;"><div style="font-size:2.8rem;">📝</div><h3>${leaves.filter(l=>l.status==='pending').length}</h3><p>Pending Leaves</p></div>
            </div>`;
        }

        function renderEmployees(){
            if(currentUser.role === 'teacher') return '<div class="card">Access denied for teachers.</div>';
            const emps = JSON.parse(localStorage.getItem('cheziya_employees'));
            return `<div class="card"><div class="card-header"><h3>Staff Directory</h3><button class="btn btn-primary" onclick="openAddEmployee()">+ Add Employee</button></div><div class="table-responsive"><table><thead><tr><th>Name</th><th>ID</th><th>Position</th><th>Department</th><th>Status</th><th>Actions</th></tr></thead><tbody>${emps.map(e=>`<tr><td>${e.name}</td><td>${e.empId}</td><td>${e.position}</td><td>${e.department||'-'}</td><td><span class="badge-status">${e.status}</span></td><td><button class="btn btn-sm btn-outline" onclick="editEmployee('${e.id}')">✏️</button> <button class="btn btn-sm btn-outline" onclick="deleteEmployee('${e.id}')">🗑️</button></td></tr>`).join('')}</tbody></table></div></div>`;
        }

        window.openAddEmployee = () => {
            openModal('Add Employee', `<form id="addEmpForm"><input name="name" placeholder="Full Name" required><input name="empId" placeholder="Employee ID" required><input name="position" placeholder="Position"><input name="department" placeholder="Department"><select name="status"><option>Active</option><option>On Leave</option></select><button type="submit" class="btn btn-primary">Save</button></form>`);
            document.getElementById('addEmpForm').onsubmit = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newEmp = { id:'emp_'+Date.now(), name:fd.get('name'), empId:fd.get('empId'), position:fd.get('position'), department:fd.get('department'), status:fd.get('status') };
                let emps = JSON.parse(localStorage.getItem('cheziya_employees'));
                emps.push(newEmp);
                localStorage.setItem('cheziya_employees', JSON.stringify(emps));
                closeModal(); renderPage('employees'); showToast('Employee added');
            };
        };
        window.editEmployee = (id) => {
            let emps = JSON.parse(localStorage.getItem('cheziya_employees'));
            let emp = emps.find(e=>e.id===id);
            openModal('Edit Employee', `<form id="editForm"><input name="name" value="${emp.name}"><input name="position" value="${emp.position}"><select name="status"><option ${emp.status==='Active'?'selected':''}>Active</option><option ${emp.status==='On Leave'?'selected':''}>On Leave</option></select><button type="submit">Update</button></form>`);
            document.getElementById('editForm').onsubmit = (e) => {
                e.preventDefault();
                emp.name = e.target.name.value;
                emp.position = e.target.position.value;
                emp.status = e.target.status.value;
                localStorage.setItem('cheziya_employees', JSON.stringify(emps));
                closeModal(); renderPage('employees'); showToast('Updated');
            };
        };
        window.deleteEmployee = (id) => {
            if(confirm('Delete employee?')){
                let emps = JSON.parse(localStorage.getItem('cheziya_employees')).filter(e=>e.id!==id);
                localStorage.setItem('cheziya_employees', JSON.stringify(emps));
                renderPage('employees'); showToast('Deleted');
            }
        };

        function renderDepartments(){
            let depts = JSON.parse(localStorage.getItem('cheziya_departments'));
            return `<div><button class="btn btn-primary" onclick="openAddDept()">+ New Department</button><div style="margin-top:1rem;">${depts.map(d=>`<div class="card"><div><h4>🏛️ ${d.name}</h4><p>Head: ${d.hod || 'Not assigned'}</p><button class="btn btn-sm btn-outline" onclick="editDept('${d.id}')">Edit</button> <button class="btn btn-sm btn-outline" onclick="deleteDept('${d.id}')">Delete</button></div></div>`).join('') || '<div class="card">No departments yet. Create one.</div>'}</div></div>`;
        }
        window.openAddDept = () => {
            openModal('Create Department', `<form id="deptForm"><input name="name" placeholder="Department Name" required><input name="hod" placeholder="Head of Department"><button type="submit">Create</button></form>`);
            document.getElementById('deptForm').onsubmit = (e) => {
                e.preventDefault();
                let depts = JSON.parse(localStorage.getItem('cheziya_departments'));
                depts.push({ id:'dept_'+Date.now(), name:e.target.name.value, hod:e.target.hod.value });
                localStorage.setItem('cheziya_departments', JSON.stringify(depts));
                closeModal(); renderPage('departments'); showToast('Department added');
            };
        };
        window.editDept = (id) => {
            let depts = JSON.parse(localStorage.getItem('cheziya_departments'));
            let d = depts.find(d=>d.id===id);
            openModal('Edit Department', `<form id="editDeptForm"><input name="name" value="${d.name}"><input name="hod" value="${d.hod||''}"><button>Update</button></form>`);
            document.getElementById('editDeptForm').onsubmit = (e) => {
                e.preventDefault();
                d.name = e.target.name.value;
                d.hod = e.target.hod.value;
                localStorage.setItem('cheziya_departments', JSON.stringify(depts));
                closeModal(); renderPage('departments'); showToast('Updated');
            };
        };
        window.deleteDept = (id) => {
            let depts = JSON.parse(localStorage.getItem('cheziya_departments')).filter(d=>d.id!==id);
            localStorage.setItem('cheziya_departments', JSON.stringify(depts));
            renderPage('departments'); showToast('Deleted');
        };

        function renderLeave(){
            let leaves = JSON.parse(localStorage.getItem('cheziya_leave'));
            let isAdmin = currentUser.role === 'admin' || currentUser.role === 'principal';
            return `<div class="card"><div class="card-header"><h3>Leave Applications</h3><button class="btn btn-primary" onclick="applyLeave()">+ Apply for Leave</button></div><div class="table-responsive"><table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Status</th><th>Actions</th></tr></thead><tbody>${leaves.map(l=>`<tr><td>${l.teacher}</td><td>${l.type}</td><td>${l.start} → ${l.end}</td><td><span class="badge-status">${l.status}</span></td><td>${isAdmin && l.status==='pending'? `<button class="btn btn-sm" onclick="updateLeave('${l.id}','approved')">✅ Approve</button> <button class="btn btn-sm" onclick="updateLeave('${l.id}','rejected')">❌ Reject</button>` : '-'}</td></tr>`).join('')}</tbody></table></div></div>`;
        }
        window.applyLeave = () => {
            openModal('Apply Leave', `<form id="leaveForm"><select name="type"><option>Sick Leave</option><option>Vacation</option><option>Personal</option></select><input type="date" name="start" required><input type="date" name="end" required><button type="submit">Submit</button></form>`);
            document.getElementById('leaveForm').onsubmit = (e) => {
                e.preventDefault();
                let leaves = JSON.parse(localStorage.getItem('cheziya_leave'));
                leaves.push({ id:'l_'+Date.now(), teacher:currentUser.name, type:e.target.type.value, start:e.target.start.value, end:e.target.end.value, status:'pending' });
                localStorage.setItem('cheziya_leave', JSON.stringify(leaves));
                closeModal(); renderPage('leave'); showToast('Leave requested');
            };
        };
        window.updateLeave = (id, status) => {
            let leaves = JSON.parse(localStorage.getItem('cheziya_leave'));
            let idx = leaves.findIndex(l=>l.id===id);
            if(idx!==-1) leaves[idx].status = status;
            localStorage.setItem('cheziya_leave', JSON.stringify(leaves));
            renderPage('leave'); showToast(`Leave ${status}`);
        };

        function renderAttendance(){
            let att = JSON.parse(localStorage.getItem('cheziya_attendance'));
            let today = new Date().toISOString().slice(0,10);
            let rec = att.find(a=>a.user===currentUser.name && a.date===today);
            return `<div class="card" style="text-align:center;"><h3>⏰ Today's Attendance</h3><div style="font-size:3rem;">${rec? (rec.clockOut?'✅ Complete':'🟢 Clocked In') : '❌ Not Clocked In'}</div><button class="btn btn-primary" onclick="clockInOut()">${rec && !rec.clockOut ? '🏠 Clock Out' : '🏢 Clock In'}</button></div>`;
        }
        window.clockInOut = () => {
            let att = JSON.parse(localStorage.getItem('cheziya_attendance'));
            let today = new Date().toISOString().slice(0,10);
            let idx = att.findIndex(a=>a.user===currentUser.name && a.date===today);
            if(idx === -1){
                att.push({ user:currentUser.name, date:today, clockIn:new Date().toLocaleTimeString(), clockOut:null });
                showToast('Clocked in successfully');
            } else if(!att[idx].clockOut){
                att[idx].clockOut = new Date().toLocaleTimeString();
                showToast('Clocked out, see you tomorrow');
            } else { showToast('Already completed'); return; }
            localStorage.setItem('cheziya_attendance', JSON.stringify(att));
            renderPage('attendance');
        };

        function renderAnnouncements(){
            let anns = JSON.parse(localStorage.getItem('cheziya_announcements'));
            let canPost = currentUser.role === 'admin' || currentUser.role === 'principal';
            return `<div>${anns.slice().reverse().map(a=>`<div class="card"><h4>📢 ${a.title}</h4><p>${a.content}</p><small>Posted by ${a.author} on ${a.date}</small></div>`).join('')}${canPost?`<button class="btn btn-primary" onclick="newAnnouncement()">+ New Announcement</button>`:''}</div>`;
        }
        window.newAnnouncement = () => {
            openModal('Post Announcement', `<form id="annForm"><input name="title" placeholder="Title" required><textarea name="content" rows="3" placeholder="Message..."></textarea><button type="submit">Broadcast</button></form>`);
            document.getElementById('annForm').onsubmit = (e) => {
                e.preventDefault();
                let anns = JSON.parse(localStorage.getItem('cheziya_announcements'));
                anns.push({ id:'ann_'+Date.now(), title:e.target.title.value, content:e.target.content.value, author:currentUser.name, date:new Date().toISOString().slice(0,10) });
                localStorage.setItem('cheziya_announcements', JSON.stringify(anns));
                closeModal(); renderPage('announcements'); showToast('Announcement sent');
            };
        };

        if(sessionStorage.getItem('currentUser')){ currentUser=JSON.parse(sessionStorage.getItem('currentUser')); document.getElementById('loginScreen').style.display='none'; document.getElementById('appContainer').style.display='flex'; initApp(); }
    </script>
</body>
</html>
